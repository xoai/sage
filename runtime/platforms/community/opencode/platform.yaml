# Tier A — mechanically enforced, and proven so

The three capabilities that decide the tier are attested with an instrumented
transcript (`docs/attestations/opencode-tier-a-2026-07-17.md`) and the shipped
adapter is tested deterministically against the real gate scripts
(`setup/adapter-test.mjs`). Every claim above is either checkable by conformance
or backed by evidence with an expiry — nothing is typed on faith.

## How enforcement reaches opencode

`sage init` (opencode) writes `.opencode/plugin/sage.js` and copies the gate
scripts to `.opencode/sage-hooks/`. The adapter:

- **vetoes** — `tool.execute.before` maps the opencode tool (`edit`/`write`/
  `apply_patch` → `Edit`/`Write`, paths parsed from `patchText`; `bash` →
  `Bash`) to the gate payload, runs the PreToolUse gates, and `throw`s on exit 2.
  opencode honours the throw by blocking the call.
- **records** — `tool.execute.after` runs the PostToolUse recorders
  (verify-tracker, degradation-log, manifest-sync) for their side effects.

The gates are the same platform-agnostic scripts Claude Code runs; they read
`.sage/`, not `.claude/`, so a single set enforces on both platforms.

## The honest edge

`native-skill-discovery` stays `false` — opencode has no description-triggered
discovery, so the system skills are inlined into `AGENTS.md` (Tier A is about
enforcement, not discovery). And opencode's model backend was flaky during the
probe (frequent startup hangs), which is why the load-bearing proof is the
deterministic `adapter-test.mjs` driving the real hooks, not a single live
session. The live probe supplies the one thing the harness cannot: that opencode
honours the `throw`.
