# Why so many `false`s

Because nobody has checked, and an unchecked capability is worth exactly `false`.

Antigravity's own documentation claims a skills system and parallel agents. Both
may well work. Neither has ever been verified by Sage against a real session, and
ADR-11's rule is that a capability nothing checks is a capability we do not have.
The fix is not to argue — it is to run the conformance suite and attach a
transcript.

# How to fix it

Run `develop/conformance/run-conformance.sh antigravity`, make the checks pass,
attest what cannot be checked for free, and put your name in `maintainer:`.
Porting Sage means making conformance pass, not petitioning core.
