---
name: generic
description: >
  Any tool that reads a project instructions file and nothing more — Cursor,
  Copilot, Windsurf, and the rest. Sage runs here, and it is honest about what
  that means: nothing blocks an edit, and no review is independent.
contract-version: 2
maintainer: "sage-core"

capabilities:
  context-injection: true         # it reads CLAUDE.md. That is the whole platform.
  command-delivery: false         # no slash commands; workflows are read as files
  native-skill-discovery: false   # no discovery → the generator INLINES the skills
  pre-tool-veto: false            # nothing can block an edit. Rules 3 and 5 are prose here.
  post-tool-events: false         # no audit trail can be written mechanically
  subagent-dispatch: false        # reviews run in the context that wrote the code
  session-events: false

supported-os: [linux, macos, windows]
# Genuinely true here, and cheap to be true: there is nothing to run. The only
# artifact is a markdown file, and every OS can read a markdown file.

command-prefix: "sage"
install-method: manual-copy
artifacts:
  instructions: CLAUDE.md
---
