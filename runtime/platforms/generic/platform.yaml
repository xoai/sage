version: "1.0.0"
tier: 2
capabilities:
  subagents: false
  parallel-execution: false
  worktrees: false
  hooks: false
  slash-commands: false
  skill-auto-activation: true
  file-system-access: true
command-prefix: "sage"
install-method: manual-copy
