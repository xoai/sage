# Gate Modes Configuration
#
# Defines which gates are mandatory, optional, or skipped in each mode.
# Projects can override this in .sage/config.yaml under gates.
# Moving a gate FROM mandatory TO skipped is logged as a waiver.

fix:
  mandatory:
    - hallucination-check       # Gate 4 — even small fixes can have fake imports
    - verification              # Gate 5 — prove the fix works
  optional:
    - spec-compliance           # Gate 1 — useful if fixing from a ticket spec
    - code-quality              # Gate 3 — catches low-quality fixes that cause rework
    - auto-qa                   # Gate 8 — independent verification of fix completeness
  skipped:
    - constitution-compliance   # Gate 2 — overkill for hotfixes

build:
  mandatory:
    - spec-compliance           # Gate 1
    - constitution-compliance   # Gate 2
    - code-quality              # Gate 3
    - hallucination-check       # Gate 4
    - verification              # Gate 5
  optional: []                  # Extension gates go here when enabled
  skipped: []

architect:
  mandatory:
    - spec-compliance           # Gate 1
    - constitution-compliance   # Gate 2
    - code-quality              # Gate 3
    - hallucination-check       # Gate 4
    - verification              # Gate 5
  optional: []                  # Extension gates + cross-artifact consistency
  skipped: []

# Runtime mutation enforcement is independent from the quality-gate lists above.
# It activates only for an explicitly selected run carrying the --strict flag.
# Requirements are checked only at their declared stage boundary.
strict_runtime:
  ttl_seconds: 3600
  lane_roots: []                # Empty means no repository lane lock.
  scopes:
    full:
      stages:
        pre-implementation:
          required_artifacts: [approved-plan]
          required_approvals: [plan-approved]
          required_verifications: []
        pre-completion:
          required_artifacts: []
          required_approvals: []
          required_verifications: [test-suite]
    lightweight:
      stages:
        pre-implementation:
          required_artifacts: []
          required_approvals: []
          required_verifications: []
        pre-completion:
          required_artifacts: []
          required_approvals: []
          required_verifications: [targeted-tests]
