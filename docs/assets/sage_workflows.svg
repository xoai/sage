<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans',-apple-system,system-ui,sans-serif">
<rect x="0" y="0" width="680" height="780" fill="#ffffff"/>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">The Pipeline — 9 commands, 12 core skills</text>
<text x="340" y="50" text-anchor="middle" fill="#666" font-size="11">Workflows chain skills. Users pick workflows, not skills. PM/UX workflows arrive via the sage-product pack.</text>

<!-- Router strip -->
<rect x="40" y="66" width="600" height="34" rx="8" fill="#f4f0e8" stroke="#993556" stroke-width="1"/>
<text x="60" y="87" fill="#993556" font-size="12" font-weight="700">/sage</text>
<text x="110" y="87" fill="#444" font-size="11">routes every request — keywords → classifier → confirmation</text>
<text x="620" y="87" text-anchor="end" fill="#888" font-size="10" font-style="italic">start here</text>

<!-- ═══ UNDERSTAND ═══ -->
<rect x="40" y="114" width="290" height="176" rx="10" fill="#eef6ff" stroke="#2b6cb0" stroke-width="1"/>
<text x="56" y="136" fill="#2b6cb0" font-size="13" font-weight="700">UNDERSTAND</text>

<rect x="56" y="148" width="258" height="58" rx="6" fill="#ffffff" stroke="#c9d8ea" stroke-width="1"/>
<text x="68" y="166" fill="#1a1a1a" font-size="12" font-weight="700">/learn</text>
<text x="68" y="182" fill="#555" font-size="10.5">codebase scan → memory insights</text>
<text x="68" y="196" fill="#555" font-size="10.5">--ontology maps entities &amp; dependencies</text>

<rect x="56" y="214" width="258" height="62" rx="6" fill="#ffffff" stroke="#c9d8ea" stroke-width="1" stroke-dasharray="4 3"/>
<text x="68" y="232" fill="#1a1a1a" font-size="12" font-weight="700">/research</text>
<text x="140" y="232" fill="#8a6d1a" font-size="9.5" font-weight="600">sage-product pack</text>
<text x="68" y="248" fill="#555" font-size="10.5">user-interview → jtbd →</text>
<text x="68" y="262" fill="#555" font-size="10.5">opportunity-map</text>

<!-- ═══ ENVISION ═══ -->
<rect x="350" y="114" width="290" height="176" rx="10" fill="#f3efff" stroke="#6b46c1" stroke-width="1"/>
<text x="366" y="136" fill="#6b46c1" font-size="13" font-weight="700">ENVISION</text>

<rect x="366" y="148" width="258" height="58" rx="6" fill="#ffffff" stroke="#d5cdea" stroke-width="1"/>
<text x="378" y="166" fill="#1a1a1a" font-size="12" font-weight="700">/architect</text>
<text x="378" y="182" fill="#555" font-size="10.5">elicit → design + ADR review →</text>
<text x="378" y="196" fill="#555" font-size="10.5">milestone plan → phased build</text>

<rect x="366" y="214" width="258" height="62" rx="6" fill="#ffffff" stroke="#d5cdea" stroke-width="1" stroke-dasharray="4 3"/>
<text x="378" y="232" fill="#1a1a1a" font-size="12" font-weight="700">/design</text>
<text x="438" y="232" fill="#8a6d1a" font-size="9.5" font-weight="600">sage-product pack</text>
<text x="378" y="248" fill="#555" font-size="10.5">ux-brief → ux-specify → ux-writing</text>
<text x="378" y="262" fill="#555" font-size="10.5">reads research findings automatically</text>

<!-- ═══ DELIVER ═══ -->
<rect x="40" y="304" width="600" height="200" rx="10" fill="#eefaf2" stroke="#1D9E75" stroke-width="1"/>
<text x="56" y="326" fill="#1D9E75" font-size="13" font-weight="700">DELIVER</text>

<rect x="56" y="338" width="282" height="70" rx="6" fill="#ffffff" stroke="#bfe3d2" stroke-width="1"/>
<text x="68" y="356" fill="#1a1a1a" font-size="12" font-weight="700">/build</text>
<text x="68" y="372" fill="#555" font-size="10.5">spec → plan → build-loop → quality gates</text>
<text x="68" y="386" fill="#555" font-size="10.5">auto-review · coding principles · auto-QA</text>
<text x="68" y="400" fill="#888" font-size="9.5" font-style="italic">--quality-locked · --autonomous · --subagents</text>

<rect x="352" y="338" width="272" height="70" rx="6" fill="#ffffff" stroke="#bfe3d2" stroke-width="1"/>
<text x="364" y="356" fill="#1a1a1a" font-size="12" font-weight="700">/fix</text>
<text x="364" y="372" fill="#555" font-size="10.5">diagnose → scope → fix → verify</text>
<text x="364" y="386" fill="#555" font-size="10.5">root-cause + fix-plan reviews</text>
<text x="364" y="400" fill="#888" font-size="9.5" font-style="italic">reads QA and design-review reports</text>

<rect x="56" y="418" width="282" height="70" rx="6" fill="#ffffff" stroke="#bfe3d2" stroke-width="1"/>
<text x="68" y="436" fill="#1a1a1a" font-size="12" font-weight="700">/review</text>
<text x="68" y="452" fill="#555" font-size="10.5">independent evaluation of what exists</text>
<text x="68" y="466" fill="#555" font-size="10.5">--ux audit · --design system + slop</text>
<text x="68" y="480" fill="#555" font-size="10.5">--browser functional QA (Lightpanda opt.)</text>

<rect x="352" y="418" width="272" height="70" rx="6" fill="#ffffff" stroke="#bfe3d2" stroke-width="1" stroke-dasharray="4 3"/>
<text x="364" y="436" fill="#1a1a1a" font-size="12" font-weight="700">/autoresearch</text>
<text x="478" y="436" fill="#8a6d1a" font-size="9.5" font-weight="600">pack runtime</text>
<text x="364" y="452" fill="#555" font-size="10.5">autonomous iteration toward a</text>
<text x="364" y="466" fill="#555" font-size="10.5">measurable metric</text>
<text x="364" y="480" fill="#888" font-size="9.5" font-style="italic">sage-autoresearch pack</text>

<!-- ═══ REFLECT ═══ -->
<rect x="40" y="518" width="600" height="76" rx="10" fill="#fdf3ec" stroke="#c05621" stroke-width="1"/>
<text x="56" y="540" fill="#c05621" font-size="13" font-weight="700">REFLECT</text>
<rect x="56" y="550" width="568" height="34" rx="6" fill="#ffffff" stroke="#ecd4c3" stroke-width="1"/>
<text x="68" y="571" fill="#1a1a1a" font-size="12" font-weight="700">/reflect</text>
<text x="132" y="571" fill="#555" font-size="10.5">review the cycle → extract WHEN/CHECK/BECAUSE learnings → seed the next cycle</text>

<!-- feedback arrow -->
<path d="M 640 556 C 668 556 668 130 640 130" fill="none" stroke="#c05621" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
<text x="662" y="345" fill="#c05621" font-size="9.5" transform="rotate(90 662 345)" text-anchor="middle">learnings feed back</text>

<!-- Resume strip -->
<rect x="40" y="608" width="600" height="34" rx="8" fill="#f4f0e8" stroke="#8a6d1a" stroke-width="1"/>
<text x="60" y="629" fill="#8a6d1a" font-size="12" font-weight="700">/continue</text>
<text x="140" y="629" fill="#444" font-size="11">resumes an active cycle from a generated brief — with none, prints project status</text>

<!-- Footer: progressive disclosure -->
<rect x="40" y="656" width="600" height="70" rx="10" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="56" y="678" fill="#1a1a1a" font-size="11.5" font-weight="700">Progressive disclosure — measured, not estimated</text>
<text x="56" y="696" fill="#555" font-size="10.5">Eager layer: 177 lines (~2.1K tokens), paid every turn · 7 system skills load on demand, per description match</text>
<text x="56" y="712" fill="#555" font-size="10.5">Commands pay only on invocation · deprecated aliases forward for one cycle (/analyze /qa /map /status)</text>

<text x="340" y="756" text-anchor="middle" fill="#999" font-size="9.5" font-style="italic">Core: /sage /build /fix /architect /review /learn /continue /reflect /autoresearch — /research and /design install with the sage-product pack</text>
</svg>
