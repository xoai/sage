<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans',-apple-system,system-ui,sans-serif">
<rect x="0" y="0" width="680" height="700" fill="#ffffff"/>
<defs>
<marker id="arr5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">Persistent memory — a proven mechanism, honestly priced</text>
<text x="340" y="50" text-anchor="middle" fill="#666" font-size="11">Three skills, one MCP. Wired by `sage init` (opt out: --no-memory).</text>

<!-- Three skills -->
<rect x="40" y="68" width="188" height="104" rx="10" fill="#eef6ff" stroke="#2b6cb0" stroke-width="1"/>
<text x="54" y="90" fill="#2b6cb0" font-size="12" font-weight="700">sage-self-learning</text>
<text x="54" y="108" fill="#555" font-size="10">Mistakes become structured</text>
<text x="54" y="122" fill="#555" font-size="10">prevention rules:</text>
<text x="54" y="138" fill="#2b6cb0" font-size="10" font-weight="600">WHEN / CHECK / BECAUSE</text>
<text x="54" y="156" fill="#888" font-size="9" font-style="italic">stored on corrections, searched later</text>

<rect x="246" y="68" width="188" height="104" rx="10" fill="#eefaf2" stroke="#1D9E75" stroke-width="1"/>
<text x="260" y="90" fill="#15734f" font-size="12" font-weight="700">sage-memory</text>
<text x="260" y="108" fill="#555" font-size="10">Project knowledge as focused</text>
<text x="260" y="122" fill="#555" font-size="10">prose insights — conventions,</text>
<text x="260" y="136" fill="#555" font-size="10">decisions, gotchas</text>
<text x="260" y="156" fill="#888" font-size="9" font-style="italic">one insight per entry, tagged</text>

<rect x="452" y="68" width="188" height="104" rx="10" fill="#f3efff" stroke="#6b46c1" stroke-width="1"/>
<text x="466" y="90" fill="#6b46c1" font-size="12" font-weight="700">sage-ontology</text>
<text x="466" y="108" fill="#555" font-size="10">Entity relationships and</text>
<text x="466" y="122" fill="#555" font-size="10">dependencies — touch one</text>
<text x="466" y="136" fill="#555" font-size="10">module, know the blast radius</text>
<text x="466" y="156" fill="#888" font-size="9" font-style="italic">built by /learn --ontology</text>

<path d="M 134 172 L 134 190 L 340 190" fill="none" stroke="#888" stroke-width="1.2"/>
<path d="M 340 172 L 340 202" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arr5)"/>
<path d="M 546 172 L 546 190 L 340 190" fill="none" stroke="#888" stroke-width="1.2"/>

<!-- MCP -->
<rect x="180" y="206" width="320" height="58" rx="10" fill="#1a3a2a" stroke="#1D9E75" stroke-width="1.2"/>
<text x="340" y="228" text-anchor="middle" fill="#a8f0cd" font-size="12.5" font-weight="700">sage-memory MCP</text>
<text x="340" y="246" text-anchor="middle" fill="#cde9db" font-size="10">store() · search() · delete() — persistent, project-scoped</text>
<text x="340" y="258" text-anchor="middle" fill="#8fc9ac" font-size="9" font-style="italic">survives sessions, agents, and a fresh checkout — proven end-to-end</text>

<!-- When it runs -->
<rect x="40" y="284" width="600" height="112" rx="10" fill="#fdf8ec" stroke="#b7791f" stroke-width="1.2"/>
<text x="58" y="306" fill="#975a16" font-size="12.5" font-weight="700">When it runs</text>

<rect x="56" y="316" width="278" height="68" rx="6" fill="#ffffff" stroke="#e5d3ab"/>
<text x="66" y="334" fill="#1a1a1a" font-size="10.5" font-weight="700">First-session builds — always</text>
<text x="66" y="350" fill="#555" font-size="9.5">Rule 1A: memory before work. Past mistakes and</text>
<text x="66" y="363" fill="#555" font-size="9.5">project context are searched before any</text>
<text x="66" y="376" fill="#555" font-size="9.5">Standard+ task touches code.</text>

<rect x="346" y="316" width="278" height="68" rx="6" fill="#ffffff" stroke="#e5d3ab"/>
<text x="356" y="334" fill="#1a1a1a" font-size="10.5" font-weight="700">Resume close-out — skipped by default</text>
<text x="356" y="350" fill="#555" font-size="9.5">The generated resume brief already carries the</text>
<text x="356" y="363" fill="#555" font-size="9.5">context (resume_memory: skip · ~7% of the old</text>
<text x="356" y="376" fill="#555" font-size="9.5">resume bill — `keep` restores it).</text>

<!-- What's measured -->
<rect x="40" y="412" width="600" height="128" rx="10" fill="#f0f7ff" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="58" y="434" fill="#2b6cb0" font-size="12.5" font-weight="700">What's measured, honestly</text>
<text x="58" y="454" fill="#555" font-size="10.5">The mechanism is proven: knowledge stored in one session is retrieved sessions later, accumulates, and</text>
<text x="58" y="470" fill="#555" font-size="10.5">survives a fresh checkout — every mechanism check passes through the exact stack `sage init` writes.</text>
<text x="58" y="492" fill="#555" font-size="10.5">What is not yet measured is an outcome a cheaper channel doesn't match: at every horizon tested, a bare</text>
<text x="58" y="508" fill="#555" font-size="10.5">agent got the same answers from its own history — the session log, the committed code (git is a memory</text>
<text x="58" y="524" fill="#555" font-size="10.5">system), or the platform's per-project memory. Rereading works until the log outgrows the context window.</text>

<!-- The bet -->
<rect x="40" y="556" width="600" height="86" rx="10" fill="#fdf3ec" stroke="#c05621" stroke-width="1.2"/>
<text x="58" y="578" fill="#c05621" font-size="12.5" font-weight="700">The distinctive bet — unmeasured, and labeled as such</text>
<text x="58" y="598" fill="#555" font-size="10.5">Knowledge that crosses projects — the one channel no session log, repo, or per-project store serves.</text>
<text x="58" y="614" fill="#555" font-size="10.5">That regime is still unmeasured. Memory ships as a capability with a proven mechanism,</text>
<text x="58" y="630" fill="#c05621" font-size="10.5" font-weight="600">not a measured behavioral edge.</text>

<text x="340" y="672" text-anchor="middle" fill="#999" font-size="9.5" font-style="italic">Numbers and method: docs/eval-baseline.md (L2: sage 3/3 · bare 3/3 · sage ≈2.2× the spend)</text>
</svg>
