<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans',-apple-system,system-ui,sans-serif">
<rect x="0" y="0" width="680" height="600" fill="#ffffff"/>
<defs>
<marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">Three-layer routing</text>
<text x="340" y="50" text-anchor="middle" fill="#666" font-size="11">Deterministic before probabilistic. Each layer reduces ambiguity.</text>

<!-- Input -->
<rect x="230" y="66" width="220" height="34" rx="17" fill="#f4f0e8" stroke="#888" stroke-width="1"/>
<text x="340" y="87" text-anchor="middle" fill="#333" font-size="12" font-weight="600">User input arrives</text>
<path d="M 340 100 L 340 118" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr2)"/>

<!-- Layer 1 -->
<rect x="60" y="122" width="560" height="112" rx="10" fill="#eefaf2" stroke="#1D9E75" stroke-width="1.2"/>
<text x="78" y="146" fill="#15734f" font-size="13" font-weight="700">Layer 1 — Keyword matching</text>
<text x="620" y="146" text-anchor="end" fill="#15734f" font-size="10.5" font-style="italic">deterministic, instant — settles most requests</text>
<text x="78" y="168" fill="#555" font-size="10.5">build/implement/feature → /build · fix/bug/error → /fix · architect/migrate → /architect</text>
<text x="78" y="184" fill="#555" font-size="10.5">audit/evaluate/analyze → /review --ux · qa/smoke test → /review --browser · design review → /review --design</text>
<text x="78" y="200" fill="#555" font-size="10.5">map/dependencies → /learn --ontology · resume/status → /continue · optimize/iterate until → /autoresearch</text>
<text x="78" y="220" fill="#15734f" font-size="10.5" font-weight="600">One match → announce "Sage → /workflow" and go. Several → present as options.</text>

<path d="M 340 234 L 340 254" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr2)"/>
<text x="352" y="249" fill="#888" font-size="10" font-style="italic">no match</text>

<!-- Layer 2 -->
<rect x="60" y="258" width="560" height="96" rx="10" fill="#eef6ff" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="78" y="282" fill="#2b6cb0" font-size="13" font-weight="700">Layer 2 — Sub-agent classifier</text>
<text x="620" y="282" text-anchor="end" fill="#2b6cb0" font-size="10.5" font-style="italic">via the sage-routing skill</text>
<text x="78" y="302" fill="#555" font-size="10.5">Independent context, one job: classify the request into a phase.</text>
<rect x="78" y="312" width="120" height="28" rx="6" fill="#ffffff" stroke="#c9d8ea"/><text x="138" y="330" text-anchor="middle" fill="#2b6cb0" font-size="10.5" font-weight="600">UNDERSTAND</text>
<rect x="212" y="312" width="110" height="28" rx="6" fill="#ffffff" stroke="#c9d8ea"/><text x="267" y="330" text-anchor="middle" fill="#6b46c1" font-size="10.5" font-weight="600">ENVISION</text>
<rect x="336" y="312" width="100" height="28" rx="6" fill="#ffffff" stroke="#c9d8ea"/><text x="386" y="330" text-anchor="middle" fill="#15734f" font-size="10.5" font-weight="600">DELIVER</text>
<rect x="450" y="312" width="100" height="28" rx="6" fill="#ffffff" stroke="#c9d8ea"/><text x="500" y="330" text-anchor="middle" fill="#c05621" font-size="10.5" font-weight="600">REFLECT</text>

<path d="M 340 354 L 340 374" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr2)"/>
<text x="352" y="369" fill="#888" font-size="10" font-style="italic">still ambiguous</text>

<!-- Layer 3 -->
<rect x="60" y="378" width="560" height="60" rx="10" fill="#f3efff" stroke="#6b46c1" stroke-width="1.2"/>
<text x="78" y="402" fill="#6b46c1" font-size="13" font-weight="700">Layer 3 — In-context fallback</text>
<text x="620" y="402" text-anchor="end" fill="#6b46c1" font-size="10.5" font-style="italic">last resort</text>
<text x="78" y="422" fill="#555" font-size="10.5">The main context classifies — no dispatch, lowest confidence, always followed by confirmation.</text>

<path d="M 340 438 L 340 458" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr2)"/>

<!-- Confirmation -->
<rect x="60" y="462" width="560" height="70" rx="10" fill="#fdf3ec" stroke="#c05621" stroke-width="1.2"/>
<text x="78" y="486" fill="#c05621" font-size="13" font-weight="700">Confirmation — Zone 1</text>
<text x="620" y="486" text-anchor="end" fill="#c05621" font-size="10.5" font-style="italic">the human decides</text>
<text x="78" y="506" fill="#555" font-size="10.5">Chosen workflow + 2 alternatives, skill chains visible. The user confirms before anything runs.</text>
<text x="78" y="522" fill="#888" font-size="10" font-style="italic">e.g.  1. /build (recommended)   2. /architect   3. /review --ux</text>

<!-- Footer -->
<text x="340" y="560" text-anchor="middle" fill="#999" font-size="9.5" font-style="italic">/research and /design join keyword routing when the sage-product pack is installed.</text>
<text x="340" y="576" text-anchor="middle" fill="#999" font-size="9.5" font-style="italic">Deprecated aliases forward for one cycle: /analyze → /review --ux · /qa → /review --browser · /map → /learn --ontology · /status → /continue</text>
</svg>
