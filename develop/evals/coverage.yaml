# ── System skills (ADR-9 delivery class 2) ───────────────────────────────────
#
# The content the diet moved out of the eager layer. Every one of these is
# covered by E11, and E11 is the ONLY thing standing between this content and
# silence: if a description stops triggering, the answer stops arriving, and
# nothing else in the suite would notice.
#
# The `description:` field of each of these files is load-bearing in a way no
# other prose in Sage is. It is not documentation — it is the trigger. Edit it
# and you are editing behavior, which is exactly why these rows exist.

  system-skill-sage-routing:
    path: core/system-skills/sage-routing/SKILL.md
    kind: system-skill
    covered-by: [E6, E11]
    notes: >
      E6 grades that routing still happens after the depth moved out of eager;
      E11 grades that the skill is reachable. The riskiest of the seven — routing
      is the one piece of eager content that cannot fully move, because a skill
      that teaches routing cannot fire on a turn where routing already failed.
      The keyword map stays eager for exactly that reason.

  system-skill-sage-tiers:
    path: core/system-skills/sage-tiers/SKILL.md
    kind: system-skill
    covered-by: [E11]
    notes: "E11 prompt 3 asks which tier a cross-service change is."

  system-skill-sage-using-memory:
    path: core/system-skills/sage-using-memory/SKILL.md
    kind: system-skill
    covered-by: [E11]
    notes: >
      E11 prompt 2 grades the trigger. Recall — whether a stored constraint
      actually changes a later session — remains unmeasured until L2 (Phase 5).

  system-skill-sage-checkpoints:
    path: core/system-skills/sage-checkpoints/SKILL.md
    kind: system-skill
    uncovered: >
      No scenario grades zone-footer formatting or approval-gate presentation.
      The eval driver is headless: it cannot answer an [A]/[R] prompt, so the
      half of this skill that matters most to a human user is the half a headless
      harness structurally cannot see. Honest gap, not an oversight.

  system-skill-sage-gates:
    path: core/system-skills/sage-gates/SKILL.md
    kind: system-skill
    covered-by: [E1, E7]
    notes: >
      E7 grades recovery from a spec-gate block and E1 the TDD order — both of
      which this skill explains. The hooks enforce regardless of whether the skill
      is read, which is the point: if E1/E7 hold after this content leaves the
      eager layer, ADR-9's central claim is confirmed on the strongest case.

  system-skill-sage-constitution:
    path: core/system-skills/sage-constitution/SKILL.md
    kind: system-skill
    covered-by: [E2]
    notes: >
      E2 grades "secrets never in code" under direct pressure from the user. The
      four judgment-enforced principles have no scenario — see the skill's own
      note that a principle with no mechanism is a gap in the mechanism.

  system-skill-sage-decisions:
    path: core/system-skills/sage-decisions/SKILL.md
    kind: system-skill
    covered-by: [E8]
    notes: >
      E8 asserts a decisions.md line exists — but a HOOK writes that line, not
      this skill. So the skill's actual claims (initiative log vs global, prepend
      order, alternatives recorded) are unmeasured. Cover is nominal; do not read
      this row as evidence the decision protocol works.

# ── Plugin overlay (what PLUGIN users actually receive) ──────────────────────
#
# This whole directory was invisible to the coverage contract until v1.3.0 — 10
# skills, ~2,000 lines, shipped to every plugin user and mapped by nothing.
#
# That blind spot has a body count. `sage-navigator` was a 441-line hand-written
# duplicate of the eager layer, it drifted for two releases, and it shipped a
# routing table that still sent users to /analyze, /qa and /design-review — all
# folded into other commands back in v1.2.0. Nothing compared the two copies,
# because nothing was watching this directory at all.
#
# The navigator is GENERATED now (build_plugin.py, from instructions-body.sh) and
# is not in this list, because it is no longer a hand-maintained surface — it is
# the eager layer, and the eager layer's rows are above.
#
# The rest of these are workflow→skill wrappers: the plugin's way of exposing
# /build, /fix and friends, since a plugin ships skills rather than commands.
# They are UNCOVERED, and honestly so: the eval harness drives `bin/sage init`,
# never a plugin install, so NOTHING in the suite has ever exercised the path a
# plugin user actually takes. That is the largest structural gap left in the
# coverage map and it is bigger than any single row below.

  overlay-skill-architect:
    path: runtime/plugin-overlay/skills/architect/SKILL.md
    kind: overlay-skill
    uncovered: "Plugin wrapper for /architect. The eval harness never installs the plugin."

  overlay-skill-build:
    path: runtime/plugin-overlay/skills/build/SKILL.md
    kind: overlay-skill
    uncovered: >
      Plugin wrapper for /build — the heaviest workflow, and the one E1/E4/E7/E9/E10
      all grade through `sage init` rather than through this file. If the wrapper
      and the workflow ever disagree, no scenario would notice.

  overlay-skill-configure:
    path: runtime/plugin-overlay/skills/configure/SKILL.md
    kind: overlay-skill
    uncovered: >
      Plugin-only configuration skill; no scenario installs the plugin. Documents
      the close-out economy config knobs (gate_review, batch_bookkeeping,
      trust_inherited_red, and the round-2 resume_memory / resume_test_cadence) —
      prose only; the knobs' behavior is measured through the workflows/capabilities
      they gate (E1/E4/E5/E8 and L1-resume-fidelity, all re-measured 3/3), not
      through this doc.

  overlay-skill-continue:
    path: runtime/plugin-overlay/skills/continue/SKILL.md
    kind: overlay-skill
    uncovered: >
      Plugin wrapper for /continue — doubly uncovered: the plugin path is untested
      AND resume fidelity itself has no scenario (see workflow-continue). The
      headline long-horizon claim, unmeasured on the install path most users take.

  overlay-skill-fix:
    path: runtime/plugin-overlay/skills/fix/SKILL.md
    kind: overlay-skill
    uncovered: "Plugin wrapper for /fix, which has no end-to-end scenario in either path."

  overlay-skill-learn:
    path: runtime/plugin-overlay/skills/learn/SKILL.md
    kind: overlay-skill
    uncovered: "Plugin wrapper for /learn. See workflow-learn."

  overlay-skill-reflect:
    path: runtime/plugin-overlay/skills/reflect/SKILL.md
    kind: overlay-skill
    uncovered: "Plugin wrapper for /reflect. See workflow-reflect."

  overlay-skill-review:
    path: runtime/plugin-overlay/skills/review/SKILL.md
    kind: overlay-skill
    uncovered: "Plugin wrapper for /review. See workflow-review."

  overlay-skill-sage:
    path: runtime/plugin-overlay/skills/sage/SKILL.md
    kind: overlay-skill
    uncovered: >
      The plugin's /sage router. E6 grades routing via `sage init`; this is the
      file that would do it for a plugin user, and no scenario reaches it.

  overlay-skill-sage-memory:
    path: runtime/plugin-overlay/skills/sage-memory/SKILL.md
    kind: overlay-skill
    uncovered: >
      An OVERRIDE of skills/sage-memory/ — a second copy of the memory skill,
      shipped only to plugin users. Two copies of a skill is the pattern that
      produced the navigator drift; this one is now at least visible.

  # ── Review-loop tools (behavior-bearing runtime tools, named in DISCOVERY) ──

  tool-review-ledger:
    path: runtime/tools/review.py
    kind: tool
    covered-by: [E16, E17, E18]
    notes: >
      The findings ledger: intake normalization (capping, dedup, the
      re-litigation guard), verify, dispositions, close-round, check-diff.
      Deterministic floor: develop/validators/review/ (test_review_ledger,
      test_review_checkdiff, test_review_schema, and the calibration scorer
      self-test). E16–E18 are the live-model layer on top.

  tool-review-controller:
    path: runtime/tools/sage_flags.py
    kind: tool
    covered-by: [E16]
    notes: >
      Flag parsing + the quality-locked decision logic, v1 and v2. The RR-6
      table is pinned by R1–R6 (test_review_controller.py, including the
      field-report replay in both directions); the v1 path stays byte-identical
      under test_sage_flags.py. E16 exercises the v2 controller end-to-end.
