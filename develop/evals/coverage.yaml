  capability-onboard:
    path: core/capabilities/orchestration/onboard/SKILL.md
    kind: capability
    uncovered: "First-run onboarding; no scenario simulates a first run."

  capability-sage-help:
    path: core/capabilities/orchestration/sage-help/SKILL.md
    kind: capability
