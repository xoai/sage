  capability-context-loader:
    path: core/capabilities/context/context-loader/SKILL.md
    kind: capability
    uncovered: "No scenario measures what gets loaded into context or when."

  capability-tool-use:
    path: core/capabilities/context/tool-use/SKILL.md
    kind: capability
