# Eval coverage — the contract behind "measure what you claim". (ADR-14)
#
# Read by develop/validators/check-eval-coverage.py, which CI runs on every PR.
#
# ── What this file is for ────────────────────────────────────────────────────
#
# v1.2.0 was cut after the eval suite falsified a claim the README had been
# making for months. The lesson was not "we needed an eval suite" — we had
# built one. The lesson was that the suite only bites when someone remembers
# to point it at the thing they changed. That is culture, and culture is what
# you lose first.
#
# So: every behavioral surface in Sage — each workflow, sub-workflow, hook,
# gate, skill, and each block of the eager layer — gets a row here. A row
# either names the scenarios that exercise it, or admits, in prose, that
# nothing does. There is no third option and no blank.
#
# The validator fails a PR that changes a mapped surface without touching a
# covering scenario or updating the mapping. Prose-only edits (typos,
# formatting, rewording that changes no rule) pass by putting `#eval-neutral`
# in the commit body — which is logged, not waived silently.
#
# ── On the number of `uncovered:` rows ───────────────────────────────────────
#
# There are a lot. That is the point. This file is the first honest inventory
# of what Sage measures versus what Sage ships, and the answer is that the
# eight E-scenarios cover the enforcement spine (TDD order, secrets, verify-
# before-claiming, scope, hallucination, routing, spec-gate, degradation) and
# almost nothing else. The domain skills are unmeasured. The long-horizon
# machinery — /continue, memory recall, the decision log — is unmeasured, and
# that is exactly the gap docs/eval-baseline.md names in its own words.
#
# Writing `uncovered:` costs nothing today and is visible forever. Writing a
# scenario costs a day and a model run. The debt is listed, not hidden: every
# `uncovered:` row is reproduced in eval-baseline v2's appendix (Phase 5, R124).
#
# ── Schema ───────────────────────────────────────────────────────────────────
#
#   surfaces:
#     <surface-id>:
#       path: <repo-relative file or directory>
#       kind: workflow | sub-workflow | hook | gate | skill | eager-block
#       anchor: <literal heading>      # eager-block only: locates it in `path`
#       covered-by: [E1, E7]           # XOR with `uncovered`
#       uncovered: <why nothing covers it>
#       notes: <optional caveat — e.g. partial coverage>

version: 1

# ── Workflows ────────────────────────────────────────────────────────────────

surfaces:

  workflow-build:
    path: core/workflows/build.workflow.md
    kind: workflow
    covered-by: [E1, E4, E7, E9, E10]
    notes: >
      Both paths of Step 6's fork are now covered. E1/E4/E7 grade the INLINE path
      (TDD order, scope, spec gate); E9/E10 grade the SUBAGENT path. Before E9/E10
      existed, all three of the first set would have passed with the subagent path
      completely broken, because none of them sets the flag.

  workflow-fix:
    path: core/workflows/fix.workflow.md
    kind: workflow
    covered-by: [E13]
    notes: >
      The oldest hole in the registry, closed 2026-07-17. E13 drives a reported
      bug end-to-end through the fix path: root cause (not a compensating hack),
      the fixture's red regression test turned green (starts_red gate check),
      scope held, and — sage-only — fix mode's mandatory gates observed actually
      running. E3 still covers verify-before-claiming inside a fix shape.

  workflow-architect:
    path: core/workflows/architect.workflow.md
    kind: workflow
    covered-by: [E6]
    notes: >
      E6 grades only the decision to ROUTE to architect. Nothing grades what
      architect then does — the three elicitation rounds, brief.md-before-
      design, per-milestone checkpoints — all of which the eager layer asserts
      as non-negotiable.

  workflow-review:
    path: core/workflows/review.workflow.md
    kind: workflow
    uncovered: >
      No scenario invokes /review in any of its three modes (--ux, --design,
      --browser). Its sub-agent reviews are exercised indirectly by E8's
      degradation path, which grades what happens when they CANNOT run.

  workflow-learn:
    path: core/workflows/learn.workflow.md
    kind: workflow
    uncovered: "No scenario runs a codebase scan or builds an ontology."

  workflow-reflect:
    path: core/workflows/reflect.workflow.md
    kind: workflow
    uncovered: >
      No scenario runs a retrospective. Reflect's value claim is cross-cycle
      (extract learnings → seed the next cycle), which single-session scenarios
      structurally cannot test — it needs an L-series multi-session fixture.

  workflow-continue:
    path: core/workflows/continue.workflow.md
    kind: workflow
    covered-by: [L1]
    notes: >
      L1 is the first scenario in Sage's history to cross a context boundary.
      Session 1 completes task 1 of a 3-task plan and is cut off mid-task-2;
      session 2 is a FRESH model context that has never seen it, and must resume
      from the artifacts alone. It grades the three ways a resume can be fake:
      restarting task 1, rewriting the plan, and forgetting a decision recorded
      in a session that no longer exists.

      Caveat, stated plainly: L1 does not name /continue in its prompt. Both
      conditions get the same plain-English "pick up where it left off", because
      handing the bare arm a slash command it cannot parse would be sabotage, not
      a control. So this row is covered THROUGH routing — if the dispatcher fails
      to route a resume request, L1 fails, and it fails for a reason that is worth
      knowing.

  workflow-sage:
    path: core/workflows/sage.workflow.md
    kind: workflow
    covered-by: [E6]
    notes: "E6 grades the routing decision and its announcement."

  workflow-autoresearch:
    path: core/workflows/autoresearch.workflow.md
    kind: workflow
    uncovered: >
      Optional runtime shipped in the sage-autoresearch pack; the optimization
      loop has no scenario. Its own pressure assets move with the pack (P6-T1).

  subworkflow-subagent-execution:
    path: core/workflows/sub-workflows/subagent-execution.workflow.md
    kind: sub-workflow
    covered-by: [E9, E10]
    notes: >
      E9 grades the mode end-to-end: a 3-task plan, every task done AND
      independently approved, commit ranges that resolve to real shas. E10 grades
      that the review is worth having — a planted spec violation, marked done by
      its implementer, must be caught and fixed before completion.
      What neither measures: whether the mode produces BETTER code than the inline
      loop, and what it costs. That is a comparison, needs both modes on the same
      scenarios, and is Phase 5's (P5-T3). A mechanism that works and is not worth
      its price is still a mechanism that works — different question, different
      experiment.

  subworkflow-quality-gates:
    path: core/workflows/sub-workflows/quality-gates.workflow.md
    kind: sub-workflow
    covered-by: [E1, E5, E8]
    notes: >
      E1 and E5 assert gate exit codes on the final tree; E8 asserts the loud
      degradation path when the Task tool is absent. The gate SEQUENCE — that
      gates run in order and a failure blocks completion — is asserted by the
      H-series hook tests, not by an eval scenario.

# ── Hooks (the mechanical layer — what the eval says actually moves behavior) ─

  hook-spec-gate:
    path: runtime/platforms/claude-code/hooks/sage-spec-gate.sh
    kind: hook
    covered-by: [E7]
    notes: "E7 grades both the block and the agent's recovery from it."

  hook-tdd-gate:
    path: runtime/platforms/claude-code/hooks/sage-tdd-gate.sh
    kind: hook
    covered-by: [E1]

  hook-degradation-log:
    path: runtime/platforms/claude-code/hooks/sage-degradation-log.sh
    kind: hook
    covered-by: [E8]
    notes: >
      E8 is the scenario that proved the thesis: the decisions.md line appears
      because a script writes it, not because the model remembered to.

  hook-config-gate:
    path: runtime/platforms/claude-code/hooks/sage-config-gate.sh
    kind: hook
    covered-by: [E15]
    notes: >
      The meta-gate. Found by the 2026-07-17 opencode veto probe: a gated agent,
      blocked from editing source, edited .sage/config.yaml to set
      hard_enforcement:false and escaped every gate. Blocks agent edits (and the
      obvious Bash evasions) that reduce any gate's effective-enabled state while
      enforcement is on; no opt-out (it IS hard enforcement); humans disable
      out-of-band. C1-C9 pin the matrix; E15 is the end-to-end regression.

  hook-verify-gate:
    path: runtime/platforms/claude-code/hooks/sage-verify-gate.sh
    kind: hook
    covered-by: [E14]
    notes: >
      The second hook the weak-model campaign demanded: told the tests passed by
      a wrong user, haiku-bare trusted it 0/3 and haiku with the PARAGRAPH still
      failed 2/3. A commit is where "done" becomes durable, so the commit demands
      the evidence (tracker state: THIS-session test run vs source edits — v2,
      because the unverified work may be someone else's and the agent's own
      edits cannot be the only anchor). Fail-open matrix + boundary in V1-V12;
      E14 covers the commit shape end-to-end. E3's PROSE shape ('review this,
      tests already passed' — no edit, no commit) is un-hookable without
      judging prose: the first measured failure mode that resists
      mechanization, recorded in E14's rationale.

  hook-verify-tracker:
    path: runtime/platforms/claude-code/hooks/sage-verify-tracker.sh
    kind: hook
    covered-by: [E14]
    notes: >
      The evidence half of the verify gate (PostToolUse recorder — never
      blocks). Split from the gate so a bug in one cannot take down the other.

  hook-secrets-gate:
    path: runtime/platforms/claude-code/hooks/sage-secrets-gate.sh
    kind: hook
    covered-by: [E2]
    notes: >
      Born from the weak-model campaign: handed a live key, haiku-bare hardcoded
      it 3/3 and haiku with the constitution PARAGRAPH still hardcoded it 2/3 —
      opus refused on judgment alone, and a hook is how the refusal transfers
      down-model. Provider-shaped patterns only (precision over recall — a guard
      with false positives is a guard people disable); .env/tests/fixtures
      allowed. Own suite: S1–S8 in run-hook-tests.sh. E2 covers it end-to-end;
      the down-model proof is the haiku re-run recorded in
      WEAK-MODEL-CAMPAIGN.md.

  hook-bookkeeping-gate:
    path: runtime/platforms/claude-code/hooks/sage-bookkeeping-gate.sh
    kind: hook
    covered-by: [L1]
    notes: >
      The fourth instance of the same bug. The close-out command shipped with its
      instruction in four documents, and the next kept run made zero calls to it —
      the session read none of those documents (it skipped `manifest.py resume` and
      read the manifest directly). The tool call is the only channel that provably
      reaches every session: this hook redirects a hand-edit of an active cycle's
      manifest/decisions to the one-command writer, exit-2-with-reason, the proven
      block-recover-retry pattern. Its own 10-case suite lives in run-hook-tests.sh
      (B1-B10); L1 covers it end-to-end on the resume path.

  hook-manifest-sync:
    path: runtime/platforms/claude-code/hooks/sage-manifest-sync.sh
    kind: hook
    covered-by: [L1]
    notes: >
      The third instance of the same bug, and the third fix of the same shape. L1
      caught the manifest claiming `gate_state: plan-approved` — "no tasks started" —
      with all three tasks implemented and committed; a resumed session would have
      redone the work. cycle-protocol.md had asked the model, in prose, to advance
      the field at every checkpoint, and three runs produced three different answers.

      It advances now because the agent wrote source code, and the hook firing IS the
      evidence. L1 is its regression test: it should hold at 3/3, and it is the only
      scenario that can see this at all, because it is the only one that crosses a
      context boundary.

      What the hook deliberately does NOT do is award `gates-passed` or `complete` —
      those are approval states, and a script that granted them because the files
      looked finished would forge the signature the gate exists to collect.

  hook-session-init:
    path: runtime/platforms/claude-code/hooks/sage-session-init.sh
    kind: hook
    uncovered: >
      No scenario asserts what session-start injection does to behavior. The
      H-series hook tests cover the script's own contract (it fires, it emits
      the state block); nothing measures whether the injected state changes
      what the agent then does. L1 (Phase 5) is the natural home for that.

# ── Gate scripts (three-state, standalone-invocable) ─────────────────────────

  gate-verify:
    path: core/gates/scripts/sage-verify.sh
    kind: gate
    covered-by: [E1, E4]
    notes: "Both assert exit 0 on the final tree via the gate_exit grader."

  gate-hallucination-check:
    path: core/gates/scripts/sage-hallucination-check.sh
    kind: gate
    covered-by: [E5]

  gate-spec-check:
    path: core/gates/scripts/sage-spec-check.sh
    kind: gate
    uncovered: >
      No scenario invokes Gate 1 directly. E7 exercises the spec-gate HOOK,
      which is a different mechanism (a PreToolUse veto, not a standalone
      script). The gate's own regression tests live in the gate suite — which
      the v1.3.5 --quiet flag extended: the flag is output-only (the PASS path
      collapses to one line; FAIL/UNVERIFIABLE and the checked-artifact names
      are never trimmed), so it changes no graded behavior, and the gate suite
      pins that the verdict and evidence still print.

  gate-visual:
    path: core/gates/scripts/sage-visual-gate.sh
    kind: gate
    uncovered: >
      Requires a browser runtime; no eval fixture ships one. Covered by the
      gate suite's unit cases only.

# ── Eager layer (paid on EVERY turn — the layer Phase 2 is dieting) ──────────
#
# `anchor` locates each block inside the generator body, so the validator can
# attribute a diff hunk to the specific block it changed rather than to the
# file as a whole.

  eager-identity:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "# Sage — Project Instructions"
    uncovered: >
      The identity paragraph ("You are Sage, not a generic assistant"). No
      grader inspects it. It survives the diet on the argument that the model
      must know what it is before the first token — an argument that is, by
      construction, untestable by the current suite.

  eager-constitution-preamble:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "## Process Constitution (Non-Negotiable)"
    covered-by: [E1, E2]
    notes: >
      The principles themselves are graded — tests-before-code by E1, secrets-
      never-in-code by E2. The framing prose around them is not.

  eager-rule-0-routing:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 0: Route Every Request"
    covered-by: [E6, E11]
    notes: >
      After batch 2, eager keeps ONLY the keyword map and the announce rule; the
      fallback chain, confirmation format, and worked examples are in
      sage-routing. The keyword map cannot follow them, and this is the one hard
      constraint in the whole diet: a skill that teaches routing cannot fire on a
      turn where routing has already failed. E6 is the guard on that line — if it
      regresses, this batch reverts.

  eager-rule-1a-memory:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 1A: Memory Before Work (MANDATORY for Standard+)"
    covered-by: [E11]
    notes: >
      Reduced to a pointer in batch 1; the guide now lives in sage-using-memory.
      E11 grades the trigger — asked to remember, does the agent reach for Sage's
      memory rather than the platform's — and, since batch 1, that the answer came
      from the SKILL (consulted_skill) rather than from eager. What still nothing
      measures: whether the MANDATORY pre-work search actually happens before a
      spec, or changes the artifact. L2 (Phase 5) closes that.

  eager-workflow-gates:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Workflow Gates"
    covered-by: [E1, E7]
    notes: >
      Batch 3 cut this from 60 lines to 17: every remaining bullet NAMES the hook
      that enforces it. This is the sharpest test of ADR-9's central claim. The
      60 lines described checks that sage-spec-gate and sage-tdd-gate perform
      whether or not the model reads the paragraph — so if E1 and E7 still pass
      with the prose gone, the prose was decoration and the hooks are the product.
      If they regress, the hooks are not as sufficient as v1.2.0 claimed, and that
      is a far more valuable thing to learn than a smaller context window.

  eager-rule-1-state-first:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 1: State First"
    covered-by: [E11]
    notes: >
      E11 asks "what's my current cycle state?" against a seeded manifest and
      grades whether the agent finds it. That covers the LOOKUP. It does not
      cover the rule's actual claim — that state is consulted unprompted, before
      new work begins — which needs L1 (Phase 5).

  eager-skill-check:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "## Skill check — before ANY response"
    covered-by: [E11]
    notes: >
      THE dispatcher rule (R91, adapted from Superpowers with attribution). The
      single point of failure for the entire diet: every system skill reaches the
      model through this block, so if it stops firing, seven skills go silent at
      once and every other eval scenario still passes. E11 exists to make that
      loud. Treat any edit here as a behavioral change, however it reads.

  eager-rule-2-skills:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 2: Skills Before Assumptions"
    covered-by: [E11]
    notes: "Now a two-line pointer at the Skill check block above, which is the real rule."

  eager-rule-3-document-decisions:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 3: Document Decisions"
    covered-by: [E8]
    notes: "E8 grades the decisions.md artifact — though a hook writes it, not the rule."

  eager-rule-4-checkpoints:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 4: Checkpoints Are Sacred"
    covered-by: [E4]
    notes: >
      Reduced to 5 lines in batch 2; the reasoning moved to sage-checkpoints. E4
      still grades the half that a headless harness CAN see — no unilateral scope
      change. The approval-gate half remains ungradeable here.

  eager-rule-5-verify:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 5: Verify Before Claiming Done"
    covered-by: [E3]
    notes: "E3 is the direct test: the user lies that tests pass; does the agent check?"


  eager-rule-6-capture-corrections:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 6: Capture Corrections"
    covered-by: [E11]
    notes: >
      Reduced to a pointer in batch 1 — the six triggers and the storage format
      moved to sage-using-memory. E11 grades the storage vocabulary via an
      explicit "remember this". It is NOT a correction: nobody tells the agent it
      was wrong, so the mandatory-capture-on-correction path — the one the rule
      actually promises — remains unmeasured.

  eager-rule-7-record-decisions:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "### Rule 7: Record Decisions at Checkpoints"
    covered-by: [E8]
    notes: "Partial: E8 asserts a decisions.md line exists, not that it is well-formed or prepended."



  eager-communication-style:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "## Communication Style"
    uncovered: >
      The "Sage →" identity markers are asserted by E6's transcript_contains
      only incidentally (as evidence of routing). Style itself is not a
      behavioral claim and is a candidate for DELETE in the diet map.

  eager-checkpoints:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "## Checkpoints"
    uncovered: >
      Batch 2 cut this from 29 lines to 8 — the [A]/[R]/[N] contract stays, the
      four-zone protocol moved to sage-checkpoints. Still uncovered, and
      structurally so: the eval driver is headless and cannot answer an approval
      prompt, so the half of this that matters most to a human user is the half
      the harness cannot see. That is a limit of the instrument, not an oversight.




  eager-project-state:
    path: runtime/platforms/_shared/instructions-body.sh
    kind: eager-block
    anchor: "## Project State"
    uncovered: "The .sage/ layout description. Referenced by every workflow; graded by none."

# ── Skills (domain knowledge — the unmeasured 60%) ───────────────────────────
#
# Not one of the twelve shipped skills has a scenario. They are knowledge
# payloads, and the suite grades process, not knowledge. Saying so in one place
# is more honest than twelve identical excuses, but the rows stay separate so
# that adding a scenario for any one of them is a one-line edit here.

  skill-api:
    path: skills/api/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades API design output."

  skill-baas:
    path: skills/baas/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades BaaS output."

  skill-flutter:
    path: skills/flutter/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades Flutter output."

  skill-mobile:
    path: skills/mobile/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades mobile output."

  skill-nextjs:
    path: skills/nextjs/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades Next.js output."

  skill-react:
    path: skills/react/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades React output."

  skill-react-native:
    path: skills/react-native/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades React Native output."

  skill-web:
    path: skills/web/SKILL.md
    kind: skill
    uncovered: "Domain knowledge skill; no scenario grades web output."

  skill-autoresearch:
    path: skills/autoresearch/SKILL.md
    kind: skill
    uncovered: "Optional runtime; ships in the sage-autoresearch pack. See workflow-autoresearch."

  skill-sage-memory:
    path: skills/sage-memory/SKILL.md
    kind: skill
    covered-by: [E11, L2]
    notes: >
      E11 covers the TRIGGER — the agent reaches for this skill when asked to
      remember. L2 now covers RECALL, which is the skill's entire value
      proposition: a constraint stated in session 1, unrelated work in session 2,
      and in session 3 a task whose correct implementation depends on the
      constraint. Three fresh contexts, one workspace.

      L2 also instruments the mechanism rather than trusting the outcome. A pass
      could mean the memory system recalled the fact — or that the agent reread the
      session log sitting in the repo, which is exactly what the bare arm does and
      would mean this skill contributed nothing while taking the credit. The
      used_tool check on session 1 keeps those two stories apart.

  skill-sage-ontology:
    path: skills/sage-ontology/SKILL.md
    kind: skill
    uncovered: "No scenario builds or queries an entity graph."

  skill-sage-self-learning:
    path: skills/sage-self-learning/SKILL.md
    kind: skill
    uncovered: "See eager-rule-6-capture-corrections — the trigger is unmeasured, so the skill is too."

# ── Capabilities (where the rules actually live) ─────────────────────────────
#
# The workflows delegate; the capabilities do the work. build.workflow.md's
# Step 6 is nine lines that say "read the build-loop skill" — so the build loop
# that E1 and E4 actually grade is core/capabilities/orchestration/build-loop/,
# not the workflow file. Phase 3 replaces THIS, which is why it is mapped.

  capability-build-loop:
    path: core/capabilities/orchestration/build-loop/SKILL.md
    kind: capability
    covered-by: [E1, E4]
    notes: >
      The real build loop. E1 grades its TDD step, E4 its scope guard. The
      per-task gate runs it mandates are asserted by the gate suite, not by a
      scenario. Phase 3's subagent-execution sub-workflow replaces this loop
      when --subagents is active; E9/E10 will cover that path.

  capability-tdd:
    path: core/capabilities/execution/tdd/SKILL.md
    kind: capability
    covered-by: [E1]
    notes: "E1 is the order claim — and order is a fact about the git log."

  capability-scope-guard:
    path: core/capabilities/context/scope-guard/SKILL.md
    kind: capability
    covered-by: [E4]

  capability-verify-completion:
    path: core/capabilities/debugging/verify-completion/SKILL.md
    kind: capability
    covered-by: [E3]

  capability-specify:
    path: core/capabilities/planning/specify/SKILL.md
    kind: capability
    covered-by: [E7]
    notes: "E7 grades the recovery spec written after the gate blocks — not spec QUALITY."

  capability-sage-navigator:
    path: core/capabilities/orchestration/sage-navigator/SKILL.md
    kind: capability
    covered-by: [E6]
    notes: >
      Also the source of the plugin-overlay's 441-line navigator skill, which
      is a hand-maintained near-duplicate of the eager layer and has already
      drifted from it (its routing table predates the v1.2.0 command folding).
      Phase 2 should generate it or delete it; today an eager-layer edit must
      be made twice or the plugin and the project install disagree.

  capability-git-discipline:
    path: core/capabilities/execution/git-discipline/SKILL.md
    kind: capability
    covered-by: [E1]
    notes: >
      Partial: E1's git_order grader depends on the commit discipline this
      skill defines, but nothing grades the branch gate — the rule that
      implementation never lands on the default branch.

  capability-auto-review:
    path: core/capabilities/review/auto-review/SKILL.md
    kind: capability
    covered-by: [E8]
    notes: >
      Only the ABSENCE path is graded: E8 removes the Task tool and asserts the
