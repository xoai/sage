# Context budgets — a ratchet, not an aspiration.
#
# Read by runtime/tools/context_budget.py --check, which CI runs on every PR
# (.github/workflows/context-budget.yml). Numbers are LINES of the generated
# output — what a model actually reads — not lines of the source templates.
#
# ── Why these numbers are not the numbers in the spec ────────────────────────
#
# 13-spec-phase4-evidence.md §31 proposed eager ≤ 250 and build/fix/architect
# ≤ 400 each. Nothing had ever measured them. When P4-T6 finally did, all four
# were already breached:
#
#     eager CLAUDE.md   398   (spec wanted ≤ 250)
#     /build            535   (spec wanted ≤ 400)
#     /fix              465   (spec wanted ≤ 400)
#     /architect        409   (spec wanted ≤ 400)
#
# The README, meanwhile, advertised "~200 lines" of eager context. It is 398.
# That claim was off by a factor of two and had been for a long time, because
# context growth is the definitive slow leak: every addition is individually
# justified, no single commit looks careless, and the total is nobody's job.
#
# R76's instruction is "budgets set from post-Phase-3 measurements + headroom",
# and that is what these are. Setting them at the aspiration instead would have
# shipped a CI job that is red on arrival — and a permanently-red gate is not a
# gate, it is a notification people learn to close. A ratchet that holds the
# line today is worth more than a target that is ignored from the first commit.
#
# So: these budgets freeze the current cost. Growth now requires editing this
# file in the same PR, where a reviewer can see the number change. That is the
# whole mechanism.
#
# ── The target still stands ──────────────────────────────────────────────────
#
# The spec's numbers remain the goal, and the gap is real work, not a rounding
# error: the eager layer is 1.6× its target and is paid on EVERY turn of every
# session. Trimming it is its own task with its own risk (the eager body is
# where the non-negotiable rules live), and Phase 4's job was to make the cost
# visible, not to pay it down. It is visible now.
#
# Headroom is ~8%: enough that a genuine one-paragraph clarification does not
# fail CI, too little for a section to slip in unnoticed.

# ── What changed in v1.3.0 (program 2, ADR-9) ────────────────────────────────
#
# Two new sections, and they exist to stop this file from being gamed.
#
# The diet moves content out of the eager layer and into description-triggered
# skills. That is a real win — the eager layer is paid on EVERY turn, a skill is
# paid only when it is fetched. But "we cut the eager layer by 70%" is a sentence
# that stays true even if the content merely moved somewhere nobody counts, and a
# ratchet with an unmeasured escape hatch next to it is not a ratchet.
#
# So `skills:` counts the on-demand layer, and `generic:` counts the platforms
# that cannot fetch on demand and must inline everything. Neither number is paid
# every turn. Both are paid, and both are now visible.
#
# The eager cap ratchets DOWN with each move batch (C11 — this program only
# ratchets down). It does not get to drift back up because a batch was hard.

eager:
  CLAUDE.md: 345          # measured 326 · target ≤180 by P2-T8 · paid every turn
                          # ratchet: 430 → 380 (P2-T5, four redundant blocks deleted)
                          #          380 → 345 (P2-T6, memory + tiers → skills)

commands:
  build: 580              # measured 535 · target 400 · the heaviest workflow
  fix: 505                # measured 465 · target 400
  architect: 445          # measured 409 · target 400
  autoresearch: 190       # measured 174
  learn: 220              # measured 203
  reflect: 205            # measured 186
  continue: 150           # measured 137
  review: 140             # measured 126
  sage: 70                # measured  54 · the router; deliberately tiny

# ── On-demand layer (ADR-9 delivery class 2) ─────────────────────────────────
#
# Fetched only when the platform's description-triggered discovery matches. The
# sum (568 lines) is NOT a per-turn cost: a session that never asks about tiers
# never pays for sage-tiers. Caps are ~15% over measured — enough for a genuine
# clarification, too little for a section to slip in.
#
# A skill that grows without limit is a skill that has become a second eager
# layer with extra steps, which is why these have numbers at all.

skills:
  sage-gates: 140         # measured 119 · the hook/gate explainer; the biggest, and earns it
  sage-routing: 105       # measured  90
  sage-checkpoints: 92    # measured  79
  sage-using-memory: 90   # measured  77
  sage-constitution: 87   # measured  75
  sage-decisions: 80      # measured  69
  sage-tiers: 70          # measured  59

# ── Generic platform ─────────────────────────────────────────────────────────
#
# No skill discovery, so nothing can be fetched on demand and everything is
# inlined. 939 lines today = the 398-line eager body + 541 lines of inlined
# skills. This number should FALL as the eager body shrinks (batches 1-3), and
# it is the honest cost of a platform that cannot fetch.
#
# It gets its own row precisely so it cannot hide inside claude-code's number,
# which is the mistake that let the README advertise "~200 lines" while the
# real file was 398.

generic:
  CLAUDE.md: 910          # measured 884 · falls with the eager diet
                          # ratchet: 1010 → 950 (P2-T5) → 910 (P2-T6)
