# ADR-11: a declared capability that nothing checks is the pre-1.2.0 mistake with
# better formatting.
#
# Levels 1 and 3 are free and run on every PR. Level 2 costs money (it drives a
# real headless session) and runs in the release workflow, piggybacking the
# model-in-loop budget approval (R110).
name: conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to run conformance against (community platforms welcome)"
        required: false
        default: "claude-code"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Contracts parse, tiers derive, no legacy mismatches
        run: python3 runtime/tools/contract.py --check

  first-class:
    runs-on: ubuntu-latest
    needs: contract
    strategy:
      fail-fast: false
      matrix:
        platform: [claude-code, generic]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Conformance levels 1 + 3 — ${{ matrix.platform }}
        run: bash develop/conformance/run-conformance.sh ${{ matrix.platform }} --level 1,3

  community:
    # Manually triggered. Community platforms are not gated on every PR — they are
    # gated on the lifecycle policy (R113): fail for two consecutive minor releases
    # and you are dropped from the generated docs.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Conformance — ${{ inputs.platform }}
        run: bash develop/conformance/run-conformance.sh ${{ inputs.platform }} --level 1,3 --report
        continue-on-error: true

      - name: Upload the dated report
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ inputs.platform }}
          path: develop/conformance/reports/
